<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cờ Tỷ Phú Đồng Đội: Kỷ Nguyên Số</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>Cờ Tỷ Phú Kỷ Nguyên Số 🎩</h1>
            <p>Chia làm 4 Tập đoàn. Chọn phe phái của bạn!</p>
            <input type="text" id="playerName" placeholder="Tên của bạn...">

            <div class="team-selection">
                <button class="team-btn" data-team="team1" style="background:#e63946;"><i class="fas fa-building"></i>
                    Đỏ</button>
                <button class="team-btn" data-team="team2" style="background:#2a9d8f;"><i class="fas fa-leaf"></i> Xanh
                    Lá</button>
                <button class="team-btn" data-team="team3" style="background:#e9c46a; color:#333;"><i
                        class="fas fa-crown"></i> Vàng</button>
                <button class="team-btn" data-team="team4" style="background:#457b9d;"><i class="fas fa-fish"></i> Xanh
                    Dương</button>
            </div>

            <button id="joinBtn" disabled>Tham Gia Thị Trường</button>
            <div id="countdown-display"
                style="display: none; margin-top: 15px; color: #ffd166; font-weight: bold; font-size: 1.2rem;">
                Trò chơi sẽ bắt đầu sau: <span id="timer-sec">60</span>s
            </div>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="left-panel">
            <div id="dice-container"
                style="position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events:none; z-index:300;">
            </div>
            <div id="dice-result-container" style="position: absolute; top:20px; z-index: 310;">
                <div id="dice-result">?</div>
            </div>
            <div id="board-container">
                <div id="board">
                    <!-- Board cells generated by JS -->
                    <div class="center-logo">
                        <h2>TƯ BẢN<br>ĐỘC QUYỀN</h2>
                        <p>Kinh tế số</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div id="players-list">
                <h3>Các Tập Đoàn</h3>
                <!-- Teams generated by JS -->
            </div>

            <div id="turn-indicator">
                <p>Đang tải...</p>
            </div>

            <div id="actions">
                <button id="rollBtn" disabled><i class="fas fa-dice"></i> Đổ Xúc Xắc</button>
                <button id="buyBtn" disabled><i class="fas fa-building"></i> Đầu Tư (Mua)</button>
                <button id="upgradeBtn" disabled style="display:none;"><i class="fas fa-level-up-alt"></i> Nâng Cấp (x3
                    Thuế)</button>
                <button id="takeoverBtn" disabled style="display:none;"><i class="fas fa-handshake"></i> Thâu tóm (2x
                    Giá)</button>
                <button id="chanceBtn" disabled style="display:none;"><i class="fas fa-question-circle"></i> Rút Thẻ Cơ
                    Hội</button>
                <button id="endBtn" disabled><i class="fas fa-check"></i> Kết Thúc Lượt</button>
            </div>

            <!-- Tính năng làm thêm cho Cá nhân -->
            <div id="personal-actions"
                style="margin-top:5px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <button id="workBtn"
                    style="width:100%; padding:14px; background:linear-gradient(45deg, #8338ec, #3a0ca3); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1rem; transition:transform 0.2s; box-shadow:0 4px 15px rgba(131, 56, 236, 0.4);"><i
                        class="fas fa-laptop-code"></i> Cày OT (Tăng Quỹ Team)</button>
            </div>

            <div id="chat-box">
                <div id="chat-messages"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
